name: Build All Platforms

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. v1.0.0)'
        required: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller pywebview requests
      - name: Build
        run: pyinstaller --onefile --windowed --name "AI坤管理工具" main.py
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/AI坤管理工具.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller pywebview requests
      - name: Build
        run: |
          pyinstaller --onedir --windowed --name "AI坤管理工具" main.py
          cd dist
          mkdir -p "AI坤管理工具.app/Contents/MacOS"
          mkdir -p "AI坤管理工具.app/Contents/Resources"
          mv AI坤管理工具/* "AI坤管理工具.app/Contents/MacOS/"
          cat > "AI坤管理工具.app/Contents/Info.plist" << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>AI坤管理工具</string>
            <key>CFBundleName</key>
            <string>AI坤管理工具</string>
            <key>CFBundleIdentifier</key>
            <string>com.aikun.manager</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: dist/AI坤管理工具.app

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install pyinstaller pywebview requests
      - name: Install system deps
        run: sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev
      - name: Build
        run: pyinstaller --onefile --windowed --name "AI坤管理工具" main.py
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/AI坤管理工具

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/AI坤管理工具.exe
            macos/AI坤管理工具.app
            linux/AI坤管理工具
          generate_release_notes: true
